<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flame34</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0a0a0f;
  --bg-card: #12121a;
  --bg-hover: #1a1a25;
  --border: #1e1e2e;
  --text: #e4e4ef;
  --text-dim: #6b6b80;
  --text-mute: #45455a;
  --accent: #7c5cfc;
  --accent-glow: rgba(124, 92, 252, 0.15);
  --accent2: #00d9a3;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Background glow */
body::before {
  content: '';
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
}

.container {
  width: 100%;
  max-width: 640px;
  padding: 40px;
  text-align: center;
  position: relative;
  z-index: 1;
}

/* Name */
h1 {
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 8px;
}
h1 .grad {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Tagline */
.tagline {
  font-size: 15px;
  color: var(--text-dim);
  margin-bottom: 28px;
}

/* Skills */
.skills {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 28px;
}
.skill {
  padding: 5px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-dim);
  transition: all 0.2s;
}
.skill:hover {
  color: var(--accent);
  border-color: var(--accent);
}

/* Blog links */
.blog-section {
  margin-bottom: 28px;
}
.blog-label {
  font-size: 12px;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 12px;
}
.blog-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.blog-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  transition: all 0.2s;
}
.blog-item:hover {
  background: var(--bg-hover);
  border-color: var(--text-mute);
  transform: translateX(4px);
}
.blog-item .title {
  font-weight: 500;
}
.blog-item .meta {
  font-size: 12px;
  color: var(--text-mute);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
  margin-left: 12px;
}

/* Social */
.links {
  display: flex;
  justify-content: center;
  gap: 16px;
}
.link-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-dim);
}
.link-btn:hover {
  color: var(--text);
  border-color: var(--text-mute);
  background: var(--bg-hover);
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
.container > * {
  animation: fadeUp 0.5s ease both;
}
.container > *:nth-child(2) { animation-delay: 0.05s; }
.container > *:nth-child(3) { animation-delay: 0.1s; }
.container > *:nth-child(4) { animation-delay: 0.15s; }
.container > *:nth-child(5) { animation-delay: 0.2s; }

@media (max-width: 640px) {
  .container { padding: 24px; }
  .blog-item { flex-direction: column; align-items: flex-start; gap: 4px; }
  .blog-item .meta { margin-left: 0; }
}
</style>
</head>
